#==============================================================================
# [VVF] - VVF infrastructure components (ESXi, vCenter, license servers, VSP)
# Startup: Startup/VVF.py (Phases 1-5: connect hosts, check datastores,
#          post-edge VMs (license servers), vCenter)
# Shutdown: Shutdown/VVFshutdown.py reads this section for:
#   - vvfmgmtcluster -> Phases 4, 7, 8 (ESXi direct connect, vSAN, host shutdown)
#   - vvfvCenter     -> Phase 5 (vCenter VM shutdown via ESXi direct)
#   - vvfpostedgevms -> Phase 6 (license VM shutdown via ESXi direct, AFTER vCenter)
#   - vvfvspvms      -> Phase 3 (VSP VM shutdown via vCenter, BEFORE ESXi direct)
# Tools: confighol-9.1.py configure ESXi, vCenter, ops VMs
#==============================================================================

[VVF]

# ESXi hosts that host VVF management cluster (both sites)
# Format: hostname:type (type is always 'esx')
# Startup: VVF.py Phase 1 - connect, exit maintenance mode
# Shutdown: VVFshutdown.py Phase 4 (ESXi direct connect),
#           Phase 7 (vSAN elevator), Phase 8 (host shutdown)
vvfmgmtcluster = esx-01a.site-a.vcf.lab:esx
  esx-02a.site-a.vcf.lab:esx
  esx-03a.site-a.vcf.lab:esx
  esx-04a.site-a.vcf.lab:esx
  esx-01b.site-b.vcf.lab:esx
  esx-02b.site-b.vcf.lab:esx
  esx-03b.site-b.vcf.lab:esx
  esx-04b.site-b.vcf.lab:esx

# VVF management datastore names (verified during startup)
# Startup: VVF.py Phase 2 - verify datastore accessible
vvfmgmtdatastore = vsan-mgmt-01a
  vsan-mgmt-01b

# Post-Edge VMs - license servers must be powered on BEFORE vCenter
# and powered off ONLY AFTER vCenter has been fully shut down.
# Power operations always use direct ESXi connections (never vCenter API).
# Format: vmname
# Startup: VVF.py Phase 4b - power on via ESXi direct before vCenter
# Shutdown: VVFshutdown.py Phase 6 - shutdown via ESXi direct, AFTER vCenter
vvfpostedgevms = license-a
  license-b

# VVF vCenter VMs (VM display names as seen in vSphere)
# Format: vcenter-vm-name
# Startup: VVF.py Phase 5 - power on vCenter (host-agnostic search via ESXi direct)
# Shutdown: VVFshutdown.py Phase 5 - shutdown via ESXi direct (NOT vCenter API)
# Tools: confighol-9.1.py
vvfvCenter = vc-mgmt-a
  vc-mgmt-b

# VSP Platform VMs (regex pattern) - host the VCF Fleet management cluster
# Format: vm_regex:vcenter
# Startup: VVFfinal.py Task 1 - power on (via vCenter, already running at that point)
# Shutdown: VVFshutdown.py Phase 3 - graceful shutdown via vCenter (vCenter still up),
#           vcf_services_runtime_shutdown.sh in Phase 1 also powers these off via govc
vvfvspvms = vsp-01a-.*:vc-mgmt-a.site-a.vcf.lab
  vsp-01b-.*:vc-mgmt-b.site-b.vcf.lab

# VVF-specific URLs to check (separate from RESOURCES URLs)
# Format: url,expected_text
# Tools: vpodchecker.py, confighol-9.1.py
#urls = https://fleet-01a.site-a.vcf.lab/fleet-lcm/v1/components

#==============================================================================
# [VVFFINAL] - Final VVF startup tasks (VSP cluster, VCF Fleet components)
# Startup: Startup/VVFfinal.py (runs after VVF.py and vSphere.py complete)
# Shutdown: Shutdown/VVFshutdown.py reads this section for:
#   - vcfcomponents    -> Phase 1 (vcf_services_runtime_shutdown.sh graceful drain)
#   - vspcontrolplaneips -> Phase 1 (one call per site for the shutdown script)
#==============================================================================

[VVFFINAL]

# VCF Component Services on VSP management cluster (K8s workloads)
# These are the Fleet/LCM components that run on the VSP cluster in VVF.
# Format: namespace:resource_type/resource_name
# Startup:  VVFfinal.py Task 2 - fallback scale-up (replicas=1) only when the VSP
#           power-off-marker ConfigMap is absent (e.g. after an ungraceful shutdown).
#           On graceful shutdown, vcf_services_runtime_shutdown.sh writes the ConfigMap
#           with exact replica counts; VVFfinal.py restores from it automatically.
# Shutdown: NOT read by VVFshutdown.py. Phase 1 calls vcf_services_runtime_shutdown.sh
#           (port-5480 API) to drain all workloads, write the power-off-marker ConfigMap,
#           and power off VSP VMs via govc — no kubectl scale-down is performed.
vcfcomponents = telemetry:deployment/telemetry-acceptor
  vcf-fleet-depot:deployment/depot-service
  vcf-fleet-depot:deployment/distribution-service
  vcf-fleet-lcm:deployment/vcf-fleet-build-service-fleetbuild
  vcf-fleet-lcm:deployment/vcf-fleet-upgrade-service-fleetupgrade
  vcf-fleet-lcm:statefulset/vcf-fleet-lcm-db
  vcf-sddc-lcm:deployment/vcf-sddc-build-service-sddcbuild
  vcf-sddc-lcm:deployment/vcf-sddc-upgrade-service-sddcupgrade
  vcf-sddc-lcm:statefulset/vcf-sddc-lcm-db

# VSP cluster management API VIPs (port 5480) — one per site
# Used by: VVFfinal.py Task 2 (poll API health after VSP VM power-on)
#          VVFshutdown.py Phase 1 (call vcf_services_runtime_shutdown.sh per site)
# The script is called once per VIP: --node-ip <vip> authenticates to the
# cluster management API and orchestrates graceful shutdown + VM power-off.
vspcontrolplaneips = 10.1.1.142
  10.2.1.142

# VCF Component URLs to check after startup (Fleet endpoints)
# Format: url,expected_text  (401 also accepted = service up, auth required)
# Startup: VVFfinal.py Task 4
vcfcomponenturls = https://fleet-01a.site-a.vcf.lab/fleet-lcm/v1/components
  https://fleet-01b.site-b.vcf.lab/fleet-lcm/v1/components

#==============================================================================
# [SHUTDOWN] - Shutdown-specific configuration
# Read by: Shutdown/VVFshutdown.py, Shutdown/Shutdown.py
# NOTE: ESXi hosts and vCenters are read from [VVF] and [RESOURCES] sections.
#       This section contains vSAN, host shutdown settings and optional Docker.
#==============================================================================

[SHUTDOWN]

# Docker containers to stop before VVF shutdown (if running)
# Shutdown: Shutdown.py Phase 0b
shutdown_docker = false
docker_host = docker.site-a.vcf.lab
docker_user = holuser
docker_containers = gitlab,ldap,poste.io,flask

# ESXi username for SSH operations (vSAN elevator)
# Shutdown: VVFshutdown.py Phase 7
esx_username = root

# vSAN settings
# Shutdown: VVFshutdown.py Phase 7 (elevator operations)
# NOTE: ESA environments are auto-detected and skip the 45-minute wait
vsan_enabled = true
# vSAN timeout in seconds (45 minutes = 2700 seconds)
vsan_timeout = 2700

# Host shutdown toggle
# Shutdown: VVFshutdown.py Phase 8
shutdown_hosts = true

# NOTE: The following are read automatically from [VVF] section:
# - ESXi Hosts:   [VVF] vvfmgmtcluster -> Shutdown Phases 4/7/8
# - vCenter VMs:  [VVF] vvfvCenter     -> Shutdown Phase 5 (via ESXi direct)
# - License VMs:  [VVF] vvfpostedgevms -> Shutdown Phase 6 (via ESXi direct, after vCenter)
# - VSP VMs:      [VVF] vvfvspvms      -> Shutdown Phase 3 (via vCenter before ESXi direct)
# - VSP VIPs:     [VVFFINAL] vspcontrolplaneips -> Phase 1 (shutdown script per site)
