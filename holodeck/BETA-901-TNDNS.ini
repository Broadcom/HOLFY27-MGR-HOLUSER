# Read by: Startup/ESXi.py, vSphere.py, services.py, pings.py, urls.py,
#          Kubernetes.py, final.py, VCFfinal.py
# Shutdown: Shutdown/VCFshutdown.py Phase 2 reads vCenters for connections
#==============================================================================

